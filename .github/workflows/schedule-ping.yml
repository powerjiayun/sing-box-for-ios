name: Schedule Ping

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Print schedule time
        run: |
          set -euo pipefail
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "utc_time=$(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          echo "shanghai_time=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %Z')"
